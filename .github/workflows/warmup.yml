name: Claude Code Warmup

on:
  schedule:
    # Bratislava 06:00, 11:00, 16:00, 21:00
    # CEST UTC+2
    - cron: '7 4,9,14,19 * * 1-5'
    # CET UTC+1
    - cron: '7 5,10,15,20 * * 1-5'
  workflow_dispatch: {}

concurrency:
  group: claude-warmup
  cancel-in-progress: true

jobs:
  warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Debug schedule
        run: |
          echo "GitHub event: ${{ github.event_name }}"
          echo "GitHub schedule: ${{ github.event.schedule }}"
          date -u
          TZ=Europe/Bratislava date

      - name: Check Bratislava schedule season
        id: schedule_check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch detected; bypassing schedule check."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tz="$(TZ=Europe/Bratislava date +%Z)"
          run=false

          case "${{ github.event.schedule }}" in
            "7 4,9,14,19 * * 1-5")
              [ "$tz" = "CEST" ] && run=true
              ;;
            "7 5,10,15,20 * * 1-5")
              [ "$tz" = "CET" ] && run=true
              ;;
          esac

          echo "Current Bratislava timezone: $tz"
          echo "run=$run" >> "$GITHUB_OUTPUT"

      - name: Validate configuration
        if: steps.schedule_check.outputs.run == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
        run: |
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ]; then
            echo "CLAUDE_OAUTH_TOKEN secret is not set."
            echo "Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Install Claude Code
        if: steps.schedule_check.outputs.run == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Ping Claude to anchor 5-hour window
        if: steps.schedule_check.outputs.run == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
        run: |
          mkdir -p ~/.claude
          echo '{"hasCompletedOnboarding":true}' > ~/.claude.json

          output_file="$(mktemp)"
          set +e
          claude -p "hi" --model haiku --no-session-persistence >"$output_file" 2>&1
          status=$?
          set -e

          cat "$output_file"

          if [ $status -eq 0 ]; then
            echo "Claude warmup request succeeded."
            echo "✓ Warmup complete"
            exit 0
          fi

          if grep -Eiq "expired|unauthorized|invalid token|authentication|auth failed|login required|not logged in" "$output_file"; then
            echo "Claude token appears invalid or expired."
            echo "Run 'claude setup-token' locally and update the CLAUDE_OAUTH_TOKEN GitHub secret."
            exit 1
          fi

          if grep -qi "rate limit" "$output_file"; then
            echo "Claude reported a rate limit; treating as warmup success."
            echo "✓ Warmup complete"
            exit 0
          fi

          echo "Claude warmup failed with an unexpected error."
          exit $status
